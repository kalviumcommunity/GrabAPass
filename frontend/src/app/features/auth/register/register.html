<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <div mat-card-avatar class="auth-avatar">
        <mat-icon>person_add</mat-icon>
      </div>
      <mat-card-title>Create an Account</mat-card-title>
      <mat-card-subtitle>Join GrabAPass today</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput autoFocus type="text" id="name" [(ngModel)]="name" name="name" required />
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" id="email" [(ngModel)]="email" name="email" required />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone Number (Optional)</mat-label>
          <input matInput type="tel" id="phone_number" [(ngModel)]="phone_number" name="phone_number" />
          <mat-icon matPrefix>phone</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" id="password" [(ngModel)]="password" name="password" required />
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Role</mat-label>
          <mat-select id="role" [(ngModel)]="role" name="role" required>
            <mat-option value="Customer">Customer</mat-option>
            <mat-option value="Organizer">Organizer</mat-option>
          </mat-select>
          <mat-icon matPrefix>badge</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" *ngIf="role === 'Organizer'">
          <mat-label>Company Name (Optional)</mat-label>
          <input matInput type="text" id="organizer_company" [(ngModel)]="organizer_company" name="organizer_company" />
          <mat-icon matPrefix>apartment</mat-icon>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="submit-btn" [disabled]="!registerForm.form.valid">
          Register
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </mat-card-actions>
  </mat-card>
</div>
