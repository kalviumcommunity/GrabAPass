<div style="padding: 2rem;">
  <h1>GrabAPass - Live Events</h1>

  <div *ngIf="user" style="margin-bottom: 2rem; padding: 1rem; background: var(--glass-bg); border-radius: 8px;">
    <p>Logged in as: <strong>{{ user.name }}</strong> ({{ user.role }})</p>

    <button *ngIf="user.role === 'Organizer'" (click)="goToDashboard()" style="margin-top: 10px; padding: 8px 16px; background: var(--accent-primary); border: none; border-radius: 4px; color: white; cursor: pointer; margin-right: 10px;">
      Go to Dashboard
    </button>

    <button (click)="logout()" style="margin-top: 10px; padding: 8px 16px; background: transparent; border: 1px solid var(--text-secondary); border-radius: 4px; color: var(--text-primary); cursor: pointer;">
      Logout
    </button>
  </div>

  <div *ngIf="!user" style="margin-bottom: 2rem;">
    <a routerLink="/login" style="color: var(--accent-primary);">Login</a> or <a routerLink="/register" style="color: var(--accent-primary);">Register</a> to book tickets!
  </div>

  <div>
    <h3>Upcoming Events</h3>

    <div *ngIf="error" style="margin-top: 1rem; padding: 0.9rem 1rem; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.35); border-radius: 8px; color: #fca5a5;">
      {{ error }}
    </div>

    <div *ngIf="loading" style="padding: 2rem; text-align: center; color: var(--text-secondary);">
      Loading events...
    </div>

    <div *ngIf="!loading && events.length === 0" style="padding: 2rem; text-align: center; color: var(--text-secondary); background: var(--glass-bg); border-radius: 8px;">
      No events have been published yet.
    </div>

    <div *ngIf="!loading && events.length > 0" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
      <div *ngFor="let event of events" [routerLink]="['/events', event.id]" style="background: var(--glass-bg); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 1.5rem; cursor: pointer; transition: transform 0.2s;">
        <h4 style="margin: 0 0 0.5rem 0; font-size: 1.25rem;">{{ event.title }}</h4>
        <span style="color: var(--accent-primary); font-size: 0.875rem; font-weight: 500;">{{ event.category }}</span>

        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary); font-size: 0.875rem;">
          <p style="margin: 0 0 0.25rem 0;">{{ event.venue_name }}</p>
          <p style="margin: 0;">{{ event.start_time | date:'medium' }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
