services:
  postgres:
    image: postgres:15-alpine
    container_name: grabapass_db
    environment:
      POSTGRES_USER: grabapass_user
      POSTGRES_PASSWORD: grabapass_password
      POSTGRES_DB: grabapass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grabapass_user -d grabapass"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
